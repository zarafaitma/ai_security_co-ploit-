# nginx.conf  (NEW — Phase 6, Part C + Part D)
# --------------------------------------------------------------------------
# Single public entry point in front of the FastAPI backend (api:8000) and
# the Streamlit frontend (streamlit:8501). Routes /api/* to the backend
# and everything else to Streamlit.
#
# This file ships with HTTP-only active and a complete, ready-to-enable
# HTTPS server block commented out below it (Part D) -- see
# HTTPS_SETUP.md for the actual Let's Encrypt/Certbot steps. Uncomment
# that block once you have real certificates mounted at the paths it
# references; don't uncomment it before then or nginx will fail to start
# (it can't find certificate files that don't exist yet).
# --------------------------------------------------------------------------

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # ---- Part C: gzip compression ----
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # ---- Part C: request size limits ----
    client_max_body_size 10m;

    # ---- Part C: WebSocket upgrade support ----
    # Streamlit's live UI updates run over a WebSocket connection -- without
    # this map + the Upgrade/Connection headers on the streamlit location
    # block below, the app will load once and then silently stop updating.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream fastapi_backend {
        server api:8000;
    }

    upstream streamlit_frontend {
        server streamlit:8501;
    }

    # ==========================================================================
    # HTTP server (active by default). Plain reverse proxy, no TLS yet.
    # Once you've completed HTTPS_SETUP.md, replace this block with the
    # redirect-only version shown in the comment at the bottom of this
    # file, and enable the HTTPS server block below that.
    # ==========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # --- Security headers (Part C/D) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: wss: https:;" always;
        # HSTS is intentionally NOT sent on plain HTTP -- it only makes
        # sense once HTTPS is actually being served (see the HTTPS block).

        location /api/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        location / {
            proxy_pass http://streamlit_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
        }
    }

    # ==========================================================================
    # HTTPS server (Part D) -- COMMENTED OUT until real certificates exist.
    # See HTTPS_SETUP.md for how to get them (Let's Encrypt / Certbot).
    # ==========================================================================
